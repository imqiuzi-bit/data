name: 每日更新A股成交金额

on:
  schedule:
    # UTC 07:30 = 北京时间 15:30（收盘后半小时，数据已定稿）
    - cron: "30 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 抓取并更新数据
        run: python update.py

      - name: 提交回 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          if git diff --cached --quiet; then
            echo "无新数据，跳过提交"
          else
            git commit -m "auto: 更新每日成交金额 $(date +%F)"
            git push
          fi

      - name: 推送到 Hugging Face Space
        if: ${{ env.HF_USERNAME != '' && env.HF_TOKEN != '' }}
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 用全新空历史仓库只装当前网页文件，避免把含二进制(git-cmd.exe)的旧历史推给 HF 被拒
          TMP=$(mktemp -d)
          cp index.html echarts.min.js data.json data.js README.md .gitignore update.py "$TMP/" 2>/dev/null || true
          cd "$TMP"
          git init -q
          git config user.email "bot@workbuddy.local"
          git config user.name "workflow"
          git add -A
          git commit -qm "auto update $(date +%F)"
          git remote add space "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE"
          git push --force space HEAD:main
