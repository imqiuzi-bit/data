name: 每日更新A股成交金额

on:
  schedule:
    # 北京时间多个时间窗（15:30 / 16:30 / 17:30），任一成功即可补齐当日数据
    # 单一 cron 在 GitHub 公共仓库不可靠，多窗口 + 脚本自愈可逼近 100% 覆盖
    - cron: "30 7 * * *"   # 北京时间 15:30
    - cron: "30 8 * * *"   # 北京时间 16:30
    - cron: "30 9 * * *"   # 北京时间 17:30
  workflow_dispatch: {}    # 支持手动触发（兜底）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 抓取并更新数据（失败自动重试）
        run: |
          for i in 1 2 3 4 5; do
            echo "=== 抓取尝试 $i/5 ==="
            if python update.py; then
              echo "抓取成功"
              break
            fi
            echo "抓取失败，30s 后重试..."
            sleep 30
          done

      - name: 提交并推送到 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "自动更新 $(date +%Y-%m-%d) 沪深成交金额"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/imqiuzi-bit/data.git HEAD:main
          fi

      - name: 数据完整性看门狗（缺失当日数据则告警）
        if: always()
        run: |
          python - <<'PY'
          import json, sys
          from datetime import datetime as dt, timedelta
          try:
              from zoneinfo import ZoneInfo
              BJ = ZoneInfo("Asia/Shanghai")
          except Exception:
              BJ = __import__("datetime").timezone(timedelta(hours=8))
          now = dt.now(BJ)
          d = json.load(open("data.json", encoding="utf-8"))
          last = d["data"][-1]["date"]
          # 计算最近一个交易日（跳过周末）
          cur = now.date()
          while cur.weekday() >= 5:  # 5=周六 6=周日
              cur -= timedelta(days=1)
          latest_trading = cur.strftime("%Y-%m-%d")
          print("当前最新数据日期:", last)
          print("最近交易日应为:", latest_trading)
          if now.hour < 15:
              print("盘前，跳过校验")
              sys.exit(0)
          if last >= latest_trading:
              print("✅ 数据已是最新")
              sys.exit(0)
          # 数据落后：判断是“真漏更”还是“长假”
          last_dt = dt.strptime(last, "%Y-%m-%d").date()
          behind = (now.date() - last_dt).days
          if behind <= 4:
              print("⚠️ 警告：最新数据(%s)落后于最近交易日(%s)，当日数据可能缺失！" % (last, latest_trading))
              sys.exit(1)  # 构建失败 -> 通知仓库所有者
          else:
              print("ℹ️ 数据落后 %d 天，疑似法定长假，仅提示不报错。" % behind)
              sys.exit(0)
          PY

      - name: 推送数据到 HuggingFace Space
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub 2>/dev/null || true
          python - <<'PY'
          import os, json
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "imqiuzi/data"
          for f in ["data.json", "data.js", "index.html", "echarts.min.js"]:
              if os.path.exists(f):
                  try:
                      api.upload_file(path_or_fileobj=f, path_in_repo=f,
                                      repo_id=repo_id, repo_type="space")
                      print("上传", f, "成功")
                  except Exception as e:
                      print("上传", f, "失败:", e)
          PY
